name: Build Debug APK (installable today)

# Builds an unsigned, installable debug APK on every push to main (and on demand).
# No secrets, no keystore, no Play Console needed. Download the APK from the run's
# "Artifacts" section and install it on any Android phone (enable "install unknown apps").
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7 (no committed wrapper jar needed)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: residio-owner-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
