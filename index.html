<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Airsynk — Residio Hospitality Intelligence</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<div id="dc-root"></div>
<script id="dc-tpl" type="text/template">
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#eef1ec;color:#15302a;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  ::selection{background:#e7cd86;color:#15302a}
  input,select,button,textarea{font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#b8893f !important}
  .sc-scroll::-webkit-scrollbar{height:9px;width:9px}
  .sc-scroll::-webkit-scrollbar-thumb{background:rgba(21,48,42,.16);border-radius:9px}
  .sc-scroll::-webkit-scrollbar-track{background:transparent}
</style>
</helmet>

<!-- ============ LOGIN ============ -->
<sc-if value="{{ showLogin }}" hint-placeholder-val="{{ true }}">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;background:radial-gradient(130% 120% at 75% 0%,#1c4a3b,#15302a 55%,#0c211b)">
  <div style="width:100%;max-width:420px">
    <div style="display:flex;align-items:center;gap:13px;justify-content:center;margin-bottom:28px">
      <div style="width:44px;height:44px;border-radius:13px;background:linear-gradient(140deg,#e7cd86,#c9a24b 55%,#9a7424);display:flex;align-items:center;justify-content:center;color:#15302a;font-weight:800;font-size:24px">E</div>
      <div style="line-height:1.05"><div style="font-weight:700;font-size:17px;letter-spacing:.13em;color:#f6f1e7">THE EMPIRE STAYYS</div><div style="font-weight:600;font-size:9px;letter-spacing:.32em;color:#e7cd86;margin-top:3px">OPERATIONS CLOUD · v2</div></div>
    </div>
    <div style="background:#fff;border-radius:26px;padding:38px;box-shadow:0 50px 100px -40px rgba(0,0,0,.55)">
      <h1 style="margin:0 0 6px;font-weight:400;font-size:27px;letter-spacing:-.02em">Sign in</h1>
      <p style="margin:0 0 26px;font-size:14px;font-weight:300;color:rgba(21,48,42,.6)">Manage stays, channels, finance and guests.</p>
      <label style="display:block;font-size:11.5px;font-weight:700;letter-spacing:.06em;color:rgba(21,48,42,.55);margin-bottom:7px">USERNAME</label>
      <input value="{{ loginUser }}" onInput="{{ onLoginUser }}" placeholder="Meet Patel" style="width:100%;padding:14px 16px;border-radius:13px;border:1px solid rgba(21,48,42,.15);font-size:15px;margin-bottom:16px"/>
      <label style="display:block;font-size:11.5px;font-weight:700;letter-spacing:.06em;color:rgba(21,48,42,.55);margin-bottom:7px">PASSWORD</label>
      <input type="password" value="{{ loginPass }}" onInput="{{ onLoginPass }}" onKeyDown="{{ onLoginKey }}" placeholder="••••••••" style="width:100%;padding:14px 16px;border-radius:13px;border:1px solid rgba(21,48,42,.15);font-size:15px;margin-bottom:6px"/>
      <div style="{{ loginErrStyle }}">{{ loginErr }}</div>
      <button onClick="{{ loginOwner }}" style="cursor:pointer;width:100%;margin:18px 0 0;padding:15px;border-radius:13px;border:none;background:linear-gradient(120deg,#c9a24b,#9a7424);color:#fff;font-weight:600;font-size:15px">Sign in →</button>
      <div style="display:flex;align-items:center;gap:12px;margin:18px 0"><div style="flex:1;height:1px;background:rgba(21,48,42,.12)"></div><span style="font-size:12px;color:rgba(21,48,42,.4)">or</span><div style="flex:1;height:1px;background:rgba(21,48,42,.12)"></div></div>
      <button onClick="{{ loginGoogle }}" style="cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:11px;padding:13px;border-radius:13px;border:1px solid rgba(21,48,42,.16);background:#fff;color:#15302a;font-weight:600;font-size:14.5px"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>Continue with Google</button>
      <p style="text-align:center;margin:18px 0 0;font-size:12px;color:rgba(21,48,42,.45)">Private workspace · authorised access only</p>
    </div>
    <p style="text-align:center;margin:20px 0 0;font-size:12px;color:rgba(246,241,231,.45)">Prototype · not connected to live OTA data</p>
  </div>
</div>
</sc-if>

<!-- ============ APP ============ -->
<sc-if value="{{ showApp }}" hint-placeholder-val="{{ false }}">
<div style="display:flex;min-height:100vh">
  <!-- SIDEBAR -->
  <aside class="sc-scroll" style="width:244px;flex-shrink:0;background:#fff;border-right:1px solid rgba(21,48,42,.08);padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto">
    <div style="display:flex;align-items:center;gap:11px;padding:4px 8px 20px">
      <div style="width:38px;height:38px;border-radius:11px;background:linear-gradient(140deg,#e7cd86,#c9a24b 55%,#9a7424);display:flex;align-items:center;justify-content:center;color:#15302a;font-weight:800;font-size:20px">E</div>
      <div style="line-height:1.05"><div style="font-weight:700;font-size:13px;letter-spacing:.08em;color:#15302a">EMPIRE STAYYS</div><div style="font-weight:600;font-size:8px;letter-spacing:.26em;color:#b8893f;margin-top:2px">OPS CLOUD</div></div>
    </div>
    <nav style="display:flex;flex-direction:column;gap:3px">
      <sc-for list="{{ navItems }}" as="n" hint-placeholder-count="9">
        <button onClick="{{ n.onClick }}" style="{{ n.style }}"><span>{{ n.label }}</span><span style="{{ n.badgeStyle }}">{{ n.badge }}</span></button>
      </sc-for>
    </nav>
    <div style="margin-top:auto;padding-top:16px;border-top:1px solid rgba(21,48,42,.08)">
      <div style="display:flex;align-items:center;gap:11px;padding:6px 8px">
        <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(150deg,#c9a24b,#9a7424);display:flex;align-items:center;justify-content:center;font-weight:700;color:#15302a">M</div>
        <div style="line-height:1.2"><div style="font-weight:600;font-size:14px">{{ userName }}</div><div style="font-size:11px;color:rgba(21,48,42,.5)">{{ userRole }}</div></div>
      </div>
      <button onClick="{{ doLogout }}" style="cursor:pointer;width:100%;margin-top:8px;padding:10px;border-radius:10px;border:1px solid rgba(21,48,42,.14);background:none;color:rgba(21,48,42,.65);font-size:13px;font-weight:500">Sign out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main style="flex:1;min-width:0;display:flex;flex-direction:column">
    <header style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 32px;background:rgba(238,241,236,.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(21,48,42,.07);position:sticky;top:0;z-index:30">
      <div><h1 style="margin:0;font-weight:400;font-size:25px;letter-spacing:-.02em">{{ viewTitle }}</h1><div style="font-size:13px;font-weight:300;color:rgba(21,48,42,.55);margin-top:2px">{{ viewSub }}</div></div>
      <div style="display:flex;gap:10px;align-items:center">
        <select value="{{ period }}" onChange="{{ onPeriod }}" style="cursor:pointer;padding:11px 16px;border-radius:12px;border:1px solid rgba(184,137,63,.4);background:rgba(184,137,63,.07);font-weight:600;font-size:13.5px;color:#15302a">
          <sc-for list="{{ periodOpts }}" as="o" hint-placeholder-count="4"><option value="{{ o.v }}">{{ o.l }}</option></sc-for>
        </select>
        <select value="{{ propFilter }}" onChange="{{ onPropFilter }}" style="cursor:pointer;padding:11px 16px;border-radius:12px;border:1px solid rgba(184,137,63,.4);background:rgba(184,137,63,.07);font-weight:600;font-size:13.5px;color:#15302a">
          <sc-for list="{{ propFilterOpts }}" as="o" hint-placeholder-count="9"><option value="{{ o.v }}">{{ o.l }}</option></sc-for>
        </select>
        <button onClick="{{ syncAll }}" style="cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:12px;border:1px solid rgba(21,48,42,.14);background:#fff;font-weight:600;font-size:13.5px;color:#15302a">⟳ Sync all</button>
        <!-- New booking button removed: panel boots straight into the dashboard -->

      </div>
    </header>

    <div class="sc-scroll" style="padding:30px 32px;flex:1">

      <!-- ===== DASHBOARD ===== -->
      <sc-if value="{{ isDashboard }}" hint-placeholder-val="{{ true }}">
        <div style="position:relative;overflow:hidden;border-radius:24px;padding:30px 32px;margin-bottom:16px;background:linear-gradient(115deg,#15302a,#1c4a3b 65%,#236046);color:#f6f1e7;box-shadow:0 22px 54px -32px rgba(21,48,42,.55)">
          <div style="position:absolute;top:-70px;right:-20px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(201,162,75,.32),transparent 66%);filter:blur(16px)"></div>
          <div style="position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:26px">
            <div>
              <div style="font-size:12px;font-weight:600;letter-spacing:.05em;color:rgba(246,241,231,.62)">Revenue · {{ heroPeriodLabel }}</div>
              <div style="font-weight:300;font-size:clamp(40px,5.4vw,62px);line-height:1;margin-top:8px;letter-spacing:-.02em">{{ hero.revenue }}</div>
              <div style="font-size:13px;color:rgba(246,241,231,.6);margin-top:9px">Annual run-rate <b style="color:#e7cd86;font-weight:600">{{ hero.arr }}</b> · live from confirmed bookings</div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:10px">
              <div style="display:flex;flex-direction:column;gap:4px;padding:13px 17px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);min-width:92px"><span style="font-size:10.5px;font-weight:700;letter-spacing:.08em;color:rgba(246,241,231,.6)">ADR</span><span style="font-weight:600;font-size:19px;color:#f1dca0">{{ hero.adr }}</span></div>
              <div style="display:flex;flex-direction:column;gap:4px;padding:13px 17px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);min-width:92px"><span style="font-size:10.5px;font-weight:700;letter-spacing:.08em;color:rgba(246,241,231,.6)">RevPAR</span><span style="font-weight:600;font-size:19px;color:#f1dca0">{{ hero.revpar }}</span></div>
              <div style="display:flex;flex-direction:column;gap:4px;padding:13px 17px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);min-width:92px"><span style="font-size:10.5px;font-weight:700;letter-spacing:.08em;color:rgba(246,241,231,.6)">EBITDA</span><span style="font-weight:600;font-size:19px;color:#f1dca0">{{ hero.ebitda }}</span></div>
              <div style="display:flex;flex-direction:column;gap:4px;padding:13px 17px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);min-width:92px"><span style="font-size:10.5px;font-weight:700;letter-spacing:.08em;color:rgba(246,241,231,.6)">OCCUPANCY</span><span style="font-weight:600;font-size:19px;color:#f1dca0">{{ hero.occ }}</span></div>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:16px">
          <sc-for list="{{ kpis }}" as="k" hint-placeholder-count="4">
            <div style="background:#fff;border:1px solid rgba(21,48,42,.06);border-radius:20px;padding:22px;box-shadow:0 1px 2px rgba(21,48,42,.04),0 14px 36px -28px rgba(21,48,42,.3)">
              <div style="display:flex;align-items:center;justify-content:space-between"><div style="font-size:11.5px;font-weight:600;letter-spacing:.06em;color:rgba(21,48,42,.5)">{{ k.label }}</div><span style="{{ k.trendStyle }}">{{ k.trend }}</span></div>
              <div style="font-weight:300;font-size:34px;color:#15302a;margin-top:12px;line-height:1">{{ k.value }}</div>
              <div style="font-size:12.5px;font-weight:500;color:rgba(21,48,42,.5);margin-top:6px">{{ k.sub }}</div>
            </div>
          </sc-for>
        </div>
        <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:18px">
          <!-- revenue chart -->
          <div style="background:#fff;border:1px solid rgba(21,48,42,.06);border-radius:20px;padding:24px;box-shadow:0 14px 36px -30px rgba(21,48,42,.3)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><h2 style="margin:0;font-weight:600;font-size:16px">Revenue trend</h2><span style="font-size:12px;font-weight:500;color:rgba(21,48,42,.45)">Last 6 months · ₹</span></div>
            <div style="font-weight:300;font-size:30px;margin-bottom:18px">{{ revTotal }} <span style="font-size:13px;font-weight:600;color:#1f7a52">{{ revTrend }}</span></div>
            <div style="display:flex;align-items:flex-end;gap:14px;height:160px;padding-top:10px">
              <sc-for list="{{ revBars }}" as="b" hint-placeholder-count="6">
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end">
                  <div style="font-size:10.5px;font-weight:600;color:rgba(21,48,42,.5)">{{ b.short }}</div>
                  <div style="{{ b.barStyle }}"></div>
                  <div style="font-size:11px;font-weight:600;color:rgba(21,48,42,.55)">{{ b.label }}</div>
                </div>
              </sc-for>
            </div>
          </div>
          <!-- channel mix -->
          <div style="background:#fff;border:1px solid rgba(21,48,42,.06);border-radius:20px;padding:24px;box-shadow:0 14px 36px -30px rgba(21,48,42,.3)">
            <h2 style="margin:0 0 18px;font-weight:600;font-size:16px">Channel mix</h2>
            <div style="display:flex;flex-direction:column;gap:14px">
              <sc-for list="{{ channelMix }}" as="c" hint-placeholder-count="4">
                <div>
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600"><span style="width:10px;height:10px;border-radius:3px;background:{{ c.color }}"></span>{{ c.name }}</span><span style="font-size:12.5px;font-weight:600;color:rgba(21,48,42,.55)">{{ c.pct }}%</span></div>
                  <div style="height:8px;border-radius:6px;background:rgba(21,48,42,.06);overflow:hidden"><div style="{{ c.barStyle }}"></div></div>
                </div>
              </sc-for>
            </div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:18px">
          <!-- upcoming -->
          <div style="background:#fff;border:1px solid rgba(21,48,42,.06);border-radius:20px;padding:24px;box-shadow:0 14px 36px -30px rgba(21,48,42,.3)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="margin:0;font-weight:600;font-size:16px">Upcoming check-ins</h2><button onClick="{{ goReservations }}" style="cursor:pointer;border:none;background:none;color:#b8893f;font-weight:600;font-size:13px">All →</button></div>
            <div style="display:flex;flex-direction:column;gap:10px">
              <sc-for list="{{ upcoming }}" as="r" hint-placeholder-count="4">
                <div style="display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:14px;background:#f7f8f5;border:1px solid rgba(21,48,42,.05)">
                  <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(150deg,#1c4a3b,#13312a);display:flex;align-items:center;justify-content:center;font-weight:700;color:#e7cd86;font-size:14px">{{ r.initial }}</div>
                  <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">{{ r.guest }}</div><div style="font-size:12px;font-weight:300;color:rgba(21,48,42,.55)">{{ r.propertyName }} · {{ r.dateRange }}</div></div>
                  <span style="{{ r.channelStyle }}">{{ r.channel }}</span>
                </div>
              </sc-for>
            </div>
          </div>
          <!-- ratings + tasks -->
          <div style="display:flex;flex-direction:column;gap:18px">
            <div style="background:#fff;border:1px solid rgba(21,48,42,.06);border-radius:20px;padding:24px;box-shadow:0 14px 36px -30px rgba(21,48,42,.3)">
              <h2 style="margin:0 0 14px;font-weight:600;font-size:16px">Guest rating</h2>
              <div style="display:flex;align-items:baseline;gap:10px"><div style="font-weight:300;font-size:44px;color:#b8893f;line-height:1">4.75</div><div style="color:#c9a24b;font-size:18px;letter-spacing:2px">★★★★★</div></div>
              <div style="font-size:12.5px;color:rgba(21,48,42,.5);margin-top:6px">155 reviews across 8 stays</div>
            </div>
            <div style="background:#fff;border:1px solid rgba(21,48,42,.06);border-radius:20px;padding:24px;box-shadow:0 14px 36px -30px rgba(21,48,42,.3)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><h2 style="margin:0;font-weight:600;font-size:16px">Today's tasks</h2><span style="font-size:12px;font-weight:600;color:#b8893f">{{ openTasks }} open</span></div>
              <div style="display:flex;flex-direction:column;gap:9px">
                <sc-for list="{{ tasks }}" as="t" hint-placeholder-count="3">
                  <div style="display:flex;align-items:center;gap:11px"><button onClick="{{ t.onToggle }}" style="{{ t.checkStyle }}">{{ t.check }}</button><div style="flex:1"><span style="{{ t.textStyle }}">{{ t.title }}</span><div style="font-size:11.5px;color:rgba(21,48,42,.45)">{{ t.meta }}</div></div></div>
                </sc-for>
              </div>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ===== CALENDAR ===== -->
      <sc-if value="{{ isCalendar }}" hint-placeholder-val="{{ false }}">
        <div style="background:#fff;border:1px solid rgba(21,48,42,.06);border-radius:20px;padding:22px;box-shadow:0 14px 36px -30px rgba(21,48,42,.3)">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:12px">
              <button onClick="{{ prevMonth }}" style="cursor:pointer;width:36px;height:36px;border-radius:10px;border:1px solid rgba(21,48,42,.14);background:#fff;font-size:16px">‹</button>
              <div style="font-weight:600;font-size:17px;min-width:150px;text-align:center">{{ monthLabel }}</div>
              <button onClick="{{ nextMonth }}" style="cursor:pointer;width:36px;height:36px;border-radius:10px;border:1px solid rgba(21,48,42,.14);background:#fff;font-size:16px">›</button>
            </div>
            <div class="sc-scroll" style="display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;font-weight:500;color:rgba(21,48,42,.6)">
              <sc-for list="{{ legend }}" as="g" hint-placeholder-count="4"><span style="display:inline-flex;align-items:center;gap:6px"><span style="width:11px;height:11px;border-radius:3px;background:{{ g.color }}"></span>{{ g.name }}</span></sc-for>
            </div>
          </div>
          <div class="sc-scroll" style="overflow-x:auto">
            <div style="min-width:780px">
              <div style="display:grid;grid-template-columns:170px {{ dayCols }};gap:3px;margin-bottom:3px"><div></div>
                <sc-for list="{{ calDays }}" as="d" hint-placeholder-count="30"><div style="{{ d.headStyle }}">{{ d.d }}</div></sc-for>
              </div>
              <sc-for list="{{ calRows }}" as="row" hint-placeholder-count="8">
                <div style="display:grid;grid-template-columns:170px {{ dayCols }};gap:3px;margin-bottom:3px;align-items:center">
                  <div style="font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px">{{ row.name }}</div>
                  <sc-for list="{{ row.cells }}" as="c" hint-placeholder-count="30"><div title="{{ c.title }}" style="{{ c.style }}"></div></sc-for>
                </div>
              </sc-for>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ===== RESERVATIONS ===== -->
      <sc-if value="{{ isReservations }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;align-items:center">
          <sc-for list="{{ statusFilters }}" as="f" hint-placeholder-count="4"><button onClick="{{ f.onClick }}" style="{{ f.style }}">{{ f.label }}</button></sc-for>
          <div style="display:flex;gap:8px;margin-left:auto;flex-wrap:wrap">
            <select value="{{ resChannel }}" onChange="{{ onResChannel }}" style="padding:9px 14px;border-radius:10px;border:1px solid rgba(21,48,42,.14);background:#fff;font-size:13px;font-weight:600;color:#15302a;cursor:pointer">
              <sc-for list="{{ chanOpts }}" as="o" hint-placeholder-count="5"><option value="{{ o.v }}">{{ o.l }}</option></sc-for>
            </select>

      <!-- ===== MESSAGES ===== -->

              <button onClick="{{ m.onReply }}" style="cursor:pointer;flex-shrink:0;padding:9px 16px;border-radius:10px;border:none;background:linear-gradient(120deg,#c9a24b,#9a7424);color:#fff;font-weight:600;font-size:12.5px">Reply</button>

      <sc-if value="{{ isChannels }}" hint-placeholder-val="{{ false }}">

          <button onClick="{{ connectAll }}" style="cursor:pointer;margin-left:auto;padding:9px 18px;border-radius:999px;border:none;background:linear-gradient(120deg,#c9a24b,#9a7424);color:#fff;font-weight:600;font-size:13px">Connect all</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px">

                <div style="width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;background:{{ c.color }}">{{ c.mark }}</div>

            </div>

      <!-- ===== FINANCE ===== -->
      <sc-if value="{{ isFinance }}" hint-placeholder-val="{{ false }}">

        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">

            <p style="margin:0 0 18px;font-size:12.5px;font-weight:300;color:rgba(21,48,42,.55)">Projected from confirmed bookings + 6-month trend.</p>

              <sc-for list="{{ forecastBars }}" as="b" hint-placeholder-count="4"><div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end"><div style="{{ b.barStyle }}"></div><div style="font-size:10.5px;font-weight:600;color:rgba(21,48,42,.5)">{{ b.short }}</div></div></sc-for>
            </div>

            </div>
            <button onClick="{{ exportStatement }}" style="cursor:pointer;width:100%;margin-top:18px;padding:13px;border-radius:12px;border:1px solid rgba(21,48,42,.14);background:#fff;font-weight:600;font-size:13.5px">Export statement (CSV)</button>
          </div>
        </div>
        <div style="background:#fff;border:1px solid rgba(21,48,42,.06);border-radius:20px;overflow:hidden;box-shadow:0 14px 36px -30px rgba(21,48,42,.3)">
          <div style="padding:18px 22px;border-bottom:1px solid rgba(21,48,42,.07)"><h2 style="margin:0;font-weight:600;font-size:16px">Recent payouts</h2></div>

              <div style="font-size:12px;font-weight:500;color:rgba(21,48,42,.5);margin-top:6px">{{ k.sub }}</div>

          </sc-for>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">
          <div style="background:#fff;border:1px solid rgba(21,48,42,.06);border-radius:20px;padding:24px;box-shadow:0 14px 36px -30px rgba(21,48,42,.3)">

            </div>
          </div>
          <div style="background:linear-gradient(160deg,#1c4a3b,#15302a);color:#f6f1e7;border:1px solid rgba(21,48,42,.1);border-radius:20px;padding:26px;box-shadow:0 14px 36px -30px rgba(21,48,42,.4);display:flex;flex-direction:column;justify-content:center">

            <input value="{{ newsletterEmail }}" onInput="{{ onNewsletter }}" placeholder="you@email.com" style="width:100%;padding:13px 15px;border-radius:12px;border:1px solid rgba(246,241,231,.2);background:rgba(255,255,255,.06);color:#f6f1e7;font-size:14px;margin-bottom:10px"/>
            <button onClick="{{ subscribeNewsletter }}" style="cursor:pointer;width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(120deg,#e7cd86,#c9a24b);color:#15302a;font-weight:600;font-size:14px">Subscribe</button>
          </div>
        </div>
      </sc-if>

      <sc-if value="{{ isPricing }}" hint-placeholder-val="{{ false }}">

                <div style="display:flex;align-items:center;gap:8px"><button onClick="{{ p.onDec }}" style="cursor:pointer;width:30px;height:30px;border-radius:8px;border:1px solid rgba(21,48,42,.16);background:#fff;font-size:16px">−</button><span style="min-width:48px;text-align:center;font-weight:700;font-size:15px">{{ p.markup }}%</span><button onClick="{{ p.onInc }}" style="cursor:pointer;width:30px;height:30px;border-radius:8px;border:1px solid rgba(21,48,42,.16);background:#fff;font-size:16px">+</button></div>
                <span style="min-width:120px;text-align:right;font-size:13px;color:rgba(21,48,42,.6)">Avg {{ p.example }}</span>
              </div>
            </sc-for>
          </div>
        </div>
      </sc-if>
